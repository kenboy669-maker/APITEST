<!-- API 前端管理頁 -->
<!DOCTYPE html>
<html>
<head>
    <!-- Bootstrap CSS -->
    //cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>API 管理面板</h2>
        
        <!-- 新增表單 -->
        <form id="userForm" class="card p-4 mb-4">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" placeholder="姓名" id="name">
                </div>
                <div class="col-md-6 mb-3">
                    <input type="email" class="form-control" placeholder="Email" id="email">
                </div>
            </div>
            <button type="submit" class="btn btn-primary">新增用戶</button>
        </form>
        
        <!-- 用戶列表 -->
        <div id="usersList" class="table-responsive"></div>
    </div>

    <script>
    // AJAX 呼叫你的 PHP API
    async function loadUsers() {
        const res = await fetch('php/api/news');
        const users = await res.json();
        document.getElementById('usersList').innerHTML = 
            users.map(u => `
                <table class="table">
                    <tr>
                        <td>${u.id}</td>
                        <td>${u.name}</td>
                        <td>${u.email}</td>
                    </tr>
                </table>
            `).join('');
    }
    loadUsers();
    </script>
</body>
</html>
